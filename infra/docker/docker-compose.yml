services:
  gemini-acc-1:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.mcp
    container_name: mcp_gemini_1
    restart: unless-stopped
    shm_size: '2gb'
    cap_add:
      - SYS_ADMIN
    environment:
      - ACCOUNT_ID=acc_1
      - DISPLAY=:99
      - OPENAI_BASE_URL=http://host.docker.internal:9002/v1
      - CHAOS_SABOTAGE=${CHAOS_SABOTAGE:-}
      - PYTHONPATH=/app
    volumes:
      - ../../output:/app/output
      - ../../src:/app/src
      - ../../tests:/app/tests
      - ../../data/browser_sessions/acc_1:/app/data/browser_sessions/acc_1
      - ../../temp:/app/temp
      - ../../workspace:/app/workspace
      - ../../tasks:/app/tasks
      - ../../../openclaw-main/MyClaw/openclaw-main:/app/openclaw-main
      - /app/openclaw-main/node_modules
    ports:
      - "8001:8000"
      - "5901:5900"
    env_file:
      - ../../.env
  gemini-acc-2:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.mcp
    container_name: mcp_gemini_2
    restart: unless-stopped
    shm_size: '2gb'
    environment:
      - ACCOUNT_ID=acc_2
      - DISPLAY=:99
      - OPENAI_BASE_URL=http://host.docker.internal:9002/v1
    volumes:
      - ../../output:/app/output
      - ../../src:/app/src
      - ../../data/browser_sessions/acc_2:/app/data/browser_sessions/acc_2
      - ../../temp:/app/temp
      - ../../workspace:/app/workspace
      - ../../tasks:/app/tasks
    ports:
      - "8002:8000"
      - "5902:5900"
  openai-proxy:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.mcp
    container_name: openai_proxy
    restart: unless-stopped
    command: python src/proxy/openai_proxy.py
    environment:
      - MCP_HOST_1=gemini-acc-1
      - MCP_PORT_1=8000
      - MCP_HOST_2=gemini-acc-2
      - MCP_PORT_2=8000
      - OLLAMA_URL=http://host.docker.internal:11434/v1/chat/completions
    volumes:
      - ../../output:/app/output
      - ../../src:/app/src
      - ../../workspace:/app/workspace
      - ../../tasks:/app/tasks
    ports:
      - "9002:5000"
    depends_on:
      - gemini-acc-1
      - gemini-acc-2
    env_file:
      - ../../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
